<!DOCTYPE html>
<html>
<head>
    <title>REGISTRATION</title>
    <style>
        body { background-color: #9cb18d; color: #1a1a1a; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-transform: uppercase; }
        form { border: 2px solid #1a1a1a; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { background: transparent; border: 1px solid #1a1a1a; padding: 5px; font-family: inherit; }
        button { background: #1a1a1a; color: #9cb18d; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>> CREATE_NEW_USER</h2>
    <form method="POST">
        <label>ID:</label>
        <input type="text" name="username" required>
        <label>ACCESS_CODE:</label>
        <input type="password" name="password" required>
        <button type="submit">GENERATE_ACCOUNT</button>
    </form>
    <br>
    <a href="/" style="color: #1a1a1a;">[ BACK ]</a>
</body>
</html>
