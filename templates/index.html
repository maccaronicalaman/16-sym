<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>16-SYMBOL CLUB</title>
    <style>
        body { 
            background-color: #9cb18d; 
            color: #1a1a1a; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            /* 2. ЗАМЕНИЛ НА DVH, чтобы на телефоне все влезло */
            height: 100dvh; 
            width: 100%;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden; /* Чтобы экран не "прыгал" */
        }

        h1 {
            border: 2px solid #1a1a1a;
            padding: 10px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-align: center; /* Чтобы на узких экранах текст был ровно */
        }

        p {
            font-weight: bold;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            gap: 20px;
            /* На очень маленьких телефонах кнопки встанут друг под друга */
            flex-wrap: wrap; 
            justify-content: center;
        }

        a { 
            color: #9cb18d; 
            background-color: #1a1a1a; 
            padding: 15px 25px; /* Увеличил отступы, чтобы было удобно тыкать пальцем */
            text-decoration: none;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }

        a:hover {
            background-color: #333;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>SYMBOL CLUB</h1>
    <p>> MURDERING PEOPLE...</p>
    
    <div class="links">
        <a href="/login">LOGIN</a>
        <a href="/signup">SIGN UP</a>
    </div>

    <div style="margin-top: 40px; font-size: 0.8em;">
        [ SYSTEM READY ]
    </div>
</body>
</html>
