<!DOCTYPE html>
<html>
<head>
    <title>16-SYM CLUB</title>
    <style>
        body { background:#9cb18d; color:#1a1a1a; font-family:monospace; text-transform:uppercase; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; }
        .box { border:4px solid #1a1a1a; padding:20px; text-align:center; width:280px; }
        input { width:80%; background:transparent; border:2px solid #1a1a1a; padding:5px; margin:5px 0; font-family:inherit; }
        button { background:#1a1a1a; color:#9cb18d; border:none; padding:10px; width:90%; cursor:pointer; font-weight:bold; margin-top:10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>16-SYMBOL CLUB</h1>
        <form action="/login" method="POST">
            <input name="username" placeholder="NAME" required>
            <input name="password" type="password" placeholder="PASS" required>
            <button type="submit">LOGIN</button>
        </form>
        <hr>
        <form action="/signup" method="POST">
            <input name="username" placeholder="NEW NAME" required>
            <input name="password" type="password" placeholder="NEW PASS" required>
            <button type="submit" style="background:#444">SIGN UP</button>
        </form>
    </div>
</body>
</html>
