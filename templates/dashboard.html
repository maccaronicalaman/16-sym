<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="{{ url_for('static', filename='static.css') }}">
    <title>realquick_OS_v1.0</title>
    <style>
        :root { --bg: #9cb18d; --dark: #1a1a1a; }
        
        body {
            background-color: var(--bg);
            color: var(--dark);
            font-family: 'Courier New', Courier, monospace;
            padding: 10px; margin: 0;
            text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center;
        }

        .phone-screen {
            width: min(90vw, 360px); 
            height: min(95vh, 640px);
            border: 4px solid var(--dark);
            padding: 10px;
            background-color: var(--bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 0px #7a8a6e;
            margin: auto; 
        }

        #view-container {
            flex: 1;
            overflow-y: auto;
            margin: 5px 0;
            font-size: clamp(0.7rem, 2vh, 1rem);
            position: relative; 
            scroll-behavior: smooth;
        }

        header { border-bottom: 2px solid var(--dark); flex-shrink: 0; padding-bottom: 5px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.7em; }
        
        #top-mini-player {
            height: 0; opacity: 0; overflow: hidden;
            background: rgba(0,0,0,0.1); text-align: center;
            transition: 0.3s; cursor: pointer; font-size: 0.65em;
            border-top: 1px dashed transparent; margin-top: 5px;
        }
        #top-mini-player.active { height: 25px; opacity: 1; border-top: 1px dashed var(--dark); padding-top: 5px; }
        
        .dm-header-pinned {
            position: sticky; top: 0; background-color: var(--bg);
            padding: 5px 0 10px 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--dark); margin-bottom: 10px;
        }

        .btn-black {
            background: var(--dark); color: var(--bg); border: none;
            padding: 8px 12px; font-size: 0.75rem; min-height: 35px;
            cursor: pointer; font-family: inherit; text-transform: uppercase;
        }
        .btn-black:active { opacity: 0.7; }

        .search-box input {
            width: 92%; background: transparent; border: 2px solid var(--dark);
            padding: 5px; font-family: inherit; outline: none; margin-bottom: 10px;
        }
        .chat-item { padding: 10px; border-bottom: 1px dashed var(--dark); cursor: pointer; font-size: 0.8em; }

        /* --- СТИЛИ ДЛЯ РАЗДЕЛЕНИЯ СООБЩЕНИЙ (ME vs USER) --- */
        .msg-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 12px;
            flex-direction: column;
        }
        
        /* ВЫРАВНИВАНИЕ: МОИ - СПРАВА, ЧУЖИЕ - СЛЕВА */
        .wrapper-mine { align-items: flex-end; }
        .wrapper-other { align-items: flex-start; }

        .msg-bubble { 
            font-size: 0.85em; padding: 1vh; border: 1px solid var(--dark); 
            max-width: 80%; min-width: 50%; position: relative;
        }

        /* ЦВЕТА: МОИ СООБЩЕНИЯ (ТЕМНЫЕ) */
        .msg-mine {
            background-color: var(--dark);
            color: var(--bg);
            border-right: 4px solid var(--dark);
            box-shadow: -4px 4px 0px rgba(0,0,0,0.1);
        }
        
        /* ЦВЕТА: ЧУЖИЕ СООБЩЕНИЯ (СВЕТЛЫЕ) */
        .msg-other {
            background-color: transparent;
            color: var(--dark);
            border-left: 4px solid var(--dark);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
        }
        
        /* СТИЛЬ СООБЩЕНИЯ-ОТВЕТА */
        .is-reply { border: 2px dashed currentColor; }

        .msg-bubble span { display: block; margin-bottom: 5px; white-space: pre-wrap; word-break: break-all; }
        
        /* ЦИТАТА ВНУТРИ СООБЩЕНИЯ */
        .quote-box {
            font-size: 0.8em; border-left: 2px solid currentColor;
            padding-left: 5px; opacity: 0.7; margin-bottom: 8px; font-style: italic;
            background-color: rgba(128, 128, 128, 0.1);
        }

        /* --- СТИЛИ ДЛЯ ТРЕХ ТОЧЕК (МЕНЮ) --- */
        .msg-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            font-size: 0.6em; opacity: 0.8; margin-bottom: 5px;
        }
        .menu-trigger {
            cursor: pointer; font-weight: bold; padding: 0 5px; user-select: none; font-size: 1.2em;
        }
        .msg-menu {
            display: none; position: absolute; right: 5px; top: 25px;
            background: var(--dark); color: var(--bg);
            border: 1px solid var(--bg); z-index: 100;
            flex-direction: column; box-shadow: 3px 3px 0px rgba(0,0,0,0.4);
            min-width: 80px;
        }
        .msg-menu.show { display: flex; }
        .msg-menu button {
            background: transparent; color: inherit; border: none;
            padding: 8px 10px; font-family: inherit; font-size: 0.8em;
            text-align: left; cursor: pointer; border-bottom: 1px dashed var(--bg);
            text-transform: uppercase;
        }
        .msg-menu button:last-child { border-bottom: none; }
        .msg-menu button:hover { background: #333; }

        .mp3-msg { background: #8a9e7c; border: 1px solid var(--dark); padding: 5px; cursor: pointer; font-size: 0.7em; margin: 5px 0; }

        #bottom-player {
            position: absolute; bottom: -200px; left: 0; right: 0;
            height: 180px; background: var(--bg); border-top: 3px solid var(--dark);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px; z-index: 20; text-align: center;
        }
        #bottom-player.open { bottom: 0; }
        
        .scrubber { width: 100%; cursor: pointer; accent-color: var(--dark); height: 10px; }

        #dm-tools { border-top: 2px solid var(--dark); padding-top: 8px; display: none; }
        .input-row { display: flex; gap: 5px; margin-bottom: 5px; }
        #msg-input { flex-grow: 1; background: transparent; border: 1px solid var(--dark); font-family: inherit; padding: 4px; }
        .share-row { display: flex; justify-content: space-between; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="phone-screen">
    <header>
        <div class="status-bar">
            <span>📶 256-BAND</span> <span id="clock">00:00</span> <span>🔋</span>
        </div>
        <div id="top-mini-player" onclick="toggleFullPlayer(true)">
            [ <span id="mini-time">00:00</span> ] PLAYING_MP3...
        </div>
    </header>

    <div id="view-container">
        <div id="inbox-screen">
            <div class="search-box">
                <input type="text" id="contactSearch" placeholder="SEARCH..." onkeyup="filterContacts()">
            </div>
            
            <div id="chat-list">
                <div style="font-size: 0.7em; margin: 5px 0 5px 10px; opacity: 0.8;">[ all_users ]</div>
                <div style="border-bottom: 1px solid var(--dark); margin: 0 10px 10px 10px;"></div>
                {% if users %}
                    {% for user in users %}
                        <div class="chat-item" data-username="{{ user }}" onclick="openChat('{{ user }}')">>> {{ user }}</div>
                    {% endfor %}
                {% else %}
                    <div class="chat-item" style="cursor: default; opacity: 0.5;">>> NO_USERS_ONLINE</div>
                {% endif %}
            </div>
        </div>

       <div id="dm-screen" class="hidden">
            <div class="dm-header-pinned">
                <button class="btn-black" onclick="closeChat()">< BACK</button>
                <b id="chat-with" style="font-size: 0.7em;"></b>
            </div>
            <div id="chat-history"></div>
        </div>
    </div> 

    <footer id="dm-tools">
        <div class="input-row">
            <input type="text" id="msg-input" placeholder="TYPE MSG..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button class="btn-black" onclick="sendMsg()">SEND</button>
        </div>
       <div class="share-row">
         <button class="btn-black" onclick="shareLoc()">LOC</button>
    
         <input type="file" id="file-uploader" accept="image/*,audio/mp3,audio/mpeg,audio/wav" style="display: none;" onchange="handleFileUpload(event)">
    
         <button class="btn-black" onclick="document.getElementById('file-uploader').click()">MEDIA</button>
    
        <button class="btn-black" id="cancel-reply-btn" style="display:none; color: #ff4444;" onclick="cancelReply()">X REPLY</button>
        </div>
    </footer>

    <div id="bottom-player">
        <div style="font-size: 0.7em; margin-bottom: 10px;">SYSTEM_AUDIO_PRO</div>
        <input type="range" id="main-seeker" class="scrubber" value="0" step="0.1">
        <div style="display: flex; justify-content: space-between; font-size: 0.6em; margin-top: 5px;">
            <span id="cur-time">00:00</span>
            <span id="total-time">00:00</span>
        </div>
        <div style="display:flex; justify-content: center; gap: 20px; margin-top: 15px;">
            <button class="btn-black" onclick="seekAudio(-5)">-5s</button>
            <button class="btn-black" id="master-play" onclick="togglePlayback()">PAUSE</button>
            <button class="btn-black" onclick="seekAudio(5)">+5s</button>
        </div>
        <button class="btn-black" style="width:100%; margin-top:20px;" onclick="toggleFullPlayer(false)">MINIMIZE</button>
    </div>
</div>

<script>
   const socket = io();
    let currentContact = null;
    let audio = new Audio();
    let replyData = null; 
    let msgCounter = 0; // Для уникальных ID менюшек
    const seeker = document.getElementById('main-seeker');
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            
            // Figure out if it's an image or an audio file
            let fileType = 'unknown';
            if (file.type.startsWith('image/')) fileType = 'image';
            if (file.type.startsWith('audio/')) fileType = 'audio';

            // Send via socket
            socket.emit('send_message', {
                receiver: currentContact,
                text: `[SENT_A_FILE]`, 
                file_data: base64Data,
                file_type: fileType,
                parent_text: replyData 
            });
            
            event.target.value = ""; // Reset the input
            cancelReply();
        };
        reader.readAsDataURL(file); // Convert file to string
    }
    // NEW: Array to track chats that have been opened
    let recentChats = []; 

    socket.on('connect', () => {
        socket.emit('join');
    });

    socket.on('new_message', (data) => {
        if (data.sender === currentContact || data.sender === "{{ current_user }}") {
            renderMessage(data);
        }
    });

   let lastRenderedMessage = ""; // Anti-double-message tracker

    function renderMessage(data) {
        // ANTI-DOUBLE CHECK: If this exact message was just rendered, ignore it.
        const msgSignature = data.text + data.timestamp;
        if (lastRenderedMessage === msgSignature) return;
        lastRenderedMessage = msgSignature;

        msgCounter++;
        const container = document.getElementById('chat-history');
        const isMe = data.sender === "{{ current_user }}";
        
        const wrapperDiv = document.createElement('div');
        wrapperDiv.className = 'msg-wrapper ' + (isMe ? 'wrapper-mine' : 'wrapper-other');

        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-bubble ' + (isMe ? 'msg-mine' : 'msg-other');
        
        if (data.parent_text) {
            msgDiv.classList.add('is-reply');
        }
        
        const prefix = isMe ? "ME: " : `${data.sender}: `;
        let quoteHtml = data.parent_text ? `<div class="quote-box">↪ ${data.parent_text}</div>` : "";
        
        const menuId = `msg-menu-${msgCounter}`;
        const safeText = data.text ? data.text.replace(/'/g, "\\'").replace(/"/g, '&quot;') : "";

        // NEW: Check if there's a file attached and change the HTML
        let contentHtml = `<span>${data.text}</span>`;
        if (data.file_data) {
            if (data.file_type === 'image') {
                contentHtml = `<img src="${data.file_data}" style="max-width: 100%; border: 2px solid var(--dark); margin-top: 5px;">`;
            } else if (data.file_type === 'audio') {
                // Creates your green MP3 block that plays when clicked!
                contentHtml = `<div class="mp3-msg" onclick="playAudio('${data.file_data}')">▶ PLAY_AUDIO_FILE</div>`;
            }
        }
        
        msgDiv.innerHTML = `
            <div class="msg-header">
                <span>${prefix} [${data.timestamp || 'NOW'}]</span>
                <div style="position: relative;">
                    <span class="menu-trigger" onclick="toggleMsgMenu('${menuId}', event)">[...]</span>
                    <div id="${menuId}" class="msg-menu">
                        <button onclick="setReply('${safeText}')">REPLY</button>
                        <button onclick="copyContent('${safeText}')">COPY</button>
                    </div>
                </div>
            </div>
            ${quoteHtml}
            ${contentHtml} 
        `;
        
        wrapperDiv.appendChild(msgDiv);
        container.appendChild(wrapperDiv);
        
        const viewContainer = document.getElementById('view-container');
        viewContainer.scrollTop = viewContainer.scrollHeight;
    }

    function setReply(text) {
        replyData = text;
        const input = document.getElementById('msg-input');
        input.placeholder = "REPLYING TO: " + text.substring(0, 15) + "...";
        document.getElementById('cancel-reply-btn').style.display = "block";
        input.focus();
        closeAllMenus(); // Прячем меню после клика
    }

    function cancelReply() {
        replyData = null;
        document.getElementById('msg-input').placeholder = "TYPE MSG...";
        document.getElementById('cancel-reply-btn').style.display = "none";
    }

    // --- УПРАВЛЕНИЕ МЕНЮ (ТРИ ТОЧКИ) ---
    function toggleMsgMenu(menuId, event) {
        event.stopPropagation(); // Не даем клику уйти в window.onclick
        const menu = document.getElementById(menuId);
        const isShowing = menu.classList.contains('show');
        
        closeAllMenus(); // Сначала закрываем все открытые
        
        if (!isShowing) {
            menu.classList.add('show');
        }
    }

    function closeAllMenus() {
        document.querySelectorAll('.msg-menu').forEach(m => m.classList.remove('show'));
    }

    // Закрываем меню, если юзер кликнул куда-то еще
    window.onclick = function(event) {
        if (!event.target.matches('.menu-trigger')) {
            closeAllMenus();
        }
    };

    // --- ОБНОВЛЕННАЯ ФУНКЦИЯ ОТРИСОВКИ ---
    function renderMessage(data) {
        msgCounter++;
        const container = document.getElementById('chat-history');
        const isMe = data.sender === "{{ current_user }}";
        
        const wrapperDiv = document.createElement('div');
        wrapperDiv.className = 'msg-wrapper ' + (isMe ? 'wrapper-mine' : 'wrapper-other');

        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-bubble ' + (isMe ? 'msg-mine' : 'msg-other');
        
        // ЕСЛИ СООБЩЕНИЕ - ЭТО ОТВЕТ, ВЕШАЕМ НОВЫЙ КЛАСС
        if (data.parent_text) {
            msgDiv.classList.add('is-reply');
        }
        
        const prefix = isMe ? "ME: " : `${data.sender}: `;
        let quoteHtml = data.parent_text ? `<div class="quote-box">↪ ${data.parent_text}</div>` : "";
        
        const menuId = `msg-menu-${msgCounter}`;
        // Экранируем текст для безопасной передачи в функции
        const safeText = data.text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        
        msgDiv.innerHTML = `
            <div class="msg-header">
                <span>${prefix} [${data.timestamp}]</span>
                <div style="position: relative;">
                    <span class="menu-trigger" onclick="toggleMsgMenu('${menuId}', event)">[...]</span>
                    <div id="${menuId}" class="msg-menu">
                        <button onclick="setReply('${safeText}')">REPLY</button>
                        <button onclick="copyContent('${safeText}')">COPY</button>
                        <button onclick="alert('FWD')">FWD</button>
                    </div>
                </div>
            </div>
            ${quoteHtml}
            <span>${data.text}</span>
        `;
        
        wrapperDiv.appendChild(msgDiv);
        container.appendChild(wrapperDiv);
        
        const viewContainer = document.getElementById('view-container');
        viewContainer.scrollTop = viewContainer.scrollHeight;
    }

    async function openChat(user) {
    currentContact = user;
    
    // ВОТ ЭТОТ КУСОК: добавляем юзера в массив, если его там еще нет
    if (!recentChats.includes(user)) {
        recentChats.push(user);
    }
    
    // ... весь твой остальной код функции openChat() остаётся без изменений
        
        document.getElementById('inbox-screen').classList.add('hidden');
        document.getElementById('dm-screen').classList.remove('hidden');
        document.getElementById('dm-tools').style.display = 'block';
        document.getElementById('chat-with').innerText = "DM: " + user;
        document.getElementById('chat-history').innerHTML = "";
        await loadHistory(user);
    }

    function closeChat() {
        currentContact = null;
        document.getElementById('inbox-screen').classList.remove('hidden');
        document.getElementById('dm-screen').classList.add('hidden');
        document.getElementById('dm-tools').style.display = 'none';
        cancelReply();
        audio.pause();
        document.getElementById('top-mini-player').classList.remove('active');
        toggleFullPlayer(false);
        
        // NEW: Clear search and re-filter to show only recent chats when returning to inbox
        document.getElementById('contactSearch').value = "";
        filterContacts();
    }

    async function loadHistory(contact) {
        try {
            const response = await fetch(`/api/history/${contact}`);
            const messages = await response.json();
            messages.forEach(msg => renderMessage(msg));
            const viewContainer = document.getElementById('view-container');
            viewContainer.scrollTop = viewContainer.scrollHeight;
        } catch (err) { console.error(err); }
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (text && currentContact) {
            socket.emit('send_message', {
                receiver: currentContact,
                text: text,
                parent_text: replyData 
            });
            input.value = "";
            cancelReply();
        }
    }

    // UPDATED: Now respects recentChats vs active search
   function filterContacts() {
    let val = document.getElementById('contactSearch').value.toUpperCase().trim();
    let items = document.getElementsByClassName('chat-item');
    
    for (let item of items) { 
        // Пропускаем заглушку, если никого нет онлайн
        if (item.innerText.includes("NO_USERS_ONLINE")) continue;
        
        // Получаем имя пользователя из текста (убираем ">> ")
        let userName = item.innerText.replace(">> ", "").trim();
        
        if (val === "") {
            // Если строка поиска ПУСТАЯ: показываем только тех, кто в recentChats
            item.style.display = recentChats.includes(userName) ? "" : "none";
        } else {
            // Если в поиске что-то ПИШУТ: показываем всех подходящих
            item.style.display = userName.toUpperCase().includes(val) ? "" : "none";
        }
    }
}
    function playAudio(url) {
        audio.src = url; audio.play();
        document.getElementById('top-mini-player').classList.add('active');
        document.getElementById('master-play').innerText = "PAUSE";
    }

    audio.ontimeupdate = () => {
        const cur = audio.currentTime; const dur = audio.duration || 0;
        seeker.max = dur; seeker.value = cur;
        let fmt = (s) => Math.floor(s/60).toString().padStart(2,'0') + ":" + Math.floor(s%60).toString().padStart(2,'0');
        document.getElementById('mini-time').innerText = fmt(cur);
        document.getElementById('cur-time').innerText = fmt(cur);
        document.getElementById('total-time').innerText = fmt(dur);
    };

    seeker.oninput = () => { audio.currentTime = seeker.value; };

    function togglePlayback() {
        if (audio.paused) { audio.play(); document.getElementById('master-play').innerText = "PAUSE"; }
        else { audio.pause(); document.getElementById('master-play').innerText = "PLAY"; }
    }

    function seekAudio(sec) { audio.currentTime += sec; }
    function toggleFullPlayer(show) { document.getElementById('bottom-player').classList.toggle('open', show); }
    
    function copyContent(text) { 
        navigator.clipboard.writeText(text); 
        alert("TEXT COPIED"); 
        closeAllMenus();
    }

    function shareLoc() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('msg-input').value = `LOC:${p.coords.latitude.toFixed(2)},${p.coords.longitude.toFixed(2)}`;
            });
        }
    }

    function updateClock() {
        let now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    
    setInterval(updateClock, 1000);
    updateClock();
    
    // NEW: Initialize list on load so it hides everyone until you search
    window.onload = function() {
        filterContacts();
    };
</script>
</body>
</html>
