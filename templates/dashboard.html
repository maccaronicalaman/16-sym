<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NOKIA_OS_v1.0</title>

<style>

:root{--bg:#9cb18d;--dark:#1a1a1a;}

body{
background:var(--bg);
color:var(--dark);
font-family:'Courier New',monospace;
padding:10px;margin:0;
text-transform:uppercase;
display:flex;flex-direction:column;align-items:center;
}

.phone-screen{
width:320px;height:560px;
border:4px solid var(--dark);
padding:10px;background:var(--bg);
position:relative;overflow:hidden;
display:flex;flex-direction:column;
box-shadow:10px 10px 0px #7a8a6e;
}

header{border-bottom:2px solid var(--dark);flex-shrink:0;padding-bottom:5px;}

.status-bar{display:flex;justify-content:space-between;font-size:0.7em;}

#top-mini-player{
height:0;opacity:0;overflow:hidden;
background:rgba(0,0,0,0.1);
text-align:center;transition:0.3s;
cursor:pointer;font-size:0.65em;
border-top:1px dashed transparent;margin-top:5px;
}

#top-mini-player.active{
height:25px;opacity:1;border-top:1px dashed var(--dark);padding-top:5px;
}

.btn-black{
background:var(--dark);color:var(--bg);
border:none;padding:5px 8px;
font-family:inherit;font-size:0.7em;
cursor:pointer;font-weight:bold;text-transform:uppercase;
}

#view-container{flex-grow:1;overflow-y:auto;margin:10px 0;}

.search-box input{
width:92%;background:transparent;
border:2px solid var(--dark);
padding:5px;font-family:inherit;
outline:none;margin-bottom:10px;
}

.chat-item{
padding:10px;border-bottom:1px dashed var(--dark);
cursor:pointer;font-size:0.8em;
}

.msg-bubble{
border:1px solid var(--dark);
padding:6px;margin-bottom:8px;
font-size:0.75em;
}

.msg-media img{width:100%;cursor:pointer}
.msg-media video{width:100%}

.hidden{display:none}

#dm-tools{
border-top:2px solid var(--dark);
padding-top:8px;display:none;
}

.input-row{display:flex;gap:5px;margin-bottom:5px;}

#msg-input{
flex-grow:1;background:transparent;
border:1px solid var(--dark);
font-family:inherit;padding:4px;
}

.share-row{display:flex;justify-content:space-between;}

.recent-btn{
background:var(--dark);color:var(--bg);
padding:6px;text-align:center;
margin-bottom:8px;
clip-path:polygon(0 0,100% 0,85% 100%,15% 100%);
font-size:0.7em;
}

#bottom-player{
position:absolute;
bottom:-200px;left:0;right:0;
height:180px;background:var(--bg);
border-top:3px solid var(--dark);
transition:0.4s;
padding:10px;
z-index:20;text-align:center;
}

#bottom-player.open{bottom:0;}

.scrubber{width:100%;cursor:pointer;}

</style>
</head>

<body>

<div class="phone-screen">

<header>

<div class="status-bar">
<span>📶 16-SYM</span>
<span id="clock">00:00</span>
<span>🔋</span>
</div>

<div id="top-mini-player" onclick="toggleFullPlayer(true)">
[ <span id="mini-time">00:00</span> ] PLAYING_MP3...
</div>

</header>


<div id="view-container">

<div id="inbox-screen">

<div class="search-box">
<input type="text" id="contactSearch" placeholder="SEARCH..." onkeyup="searchUser()">
</div>

<div class="recent-btn">RECENT</div>

<div id="chat-list">
{% for user in recents %}
<div class="chat-item" onclick="openChat('{{user}}')">>> {{user}}</div>
{% endfor %}
</div>

</div>


<div id="dm-screen" class="hidden">

<div style="display:flex;justify-content:space-between;margin-bottom:10px;">
<button class="btn-black" onclick="closeChat()">< BACK</button>
<b id="chat-with" style="font-size:0.7em;"></b>
</div>

<div id="chat-history"></div>

</div>

</div>


<footer id="dm-tools">

<div class="input-row">
<input type="text" id="msg-input" placeholder="MESSAGE">
<button class="btn-black" onclick="sendMsg()">SEND</button>
</div>

<div class="share-row">
<button class="btn-black" onclick="sendLocation()">LOC</button>

<input type="file" id="fileInput" hidden>
<button class="btn-black" onclick="document.getElementById('fileInput').click()">FILE</button>

<button class="btn-black" onclick="document.getElementById('audioInput').click()">AUDIO</button>
<input type="file" id="audioInput" accept="audio/*" hidden>

</div>

</footer>


<div id="bottom-player">

<div style="font-size:0.7em;margin-bottom:10px;">SYSTEM_AUDIO_PRO</div>

<input type="range" id="main-seeker" class="scrubber" value="0" step="0.1">

<div style="display:flex;justify-content:space-between;font-size:0.6em;margin-top:5px;">
<span id="cur-time">00:00</span>
<span id="total-time">00:00</span>
</div>

<div style="display:flex;justify-content:center;gap:15px;margin-top:15px;">
<button class="btn-black" onclick="prevTrack()">PREV</button>
<button class="btn-black" id="master-play" onclick="togglePlayback()">PAUSE</button>
<button class="btn-black" onclick="nextTrack()">NEXT</button>
</div>

<button class="btn-black" style="width:100%;margin-top:20px;" onclick="cancelPlayer()">CANCEL</button>

</div>


</div>


<script>

let currentChat=null
let audio=new Audio()
let playlist=[]
let currentTrack=0

const seeker=document.getElementById("main-seeker")

function openChat(user){
currentChat=user

document.getElementById("inbox-screen").classList.add("hidden")
document.getElementById("dm-screen").classList.remove("hidden")
document.getElementById("dm-tools").style.display="block"

document.getElementById("chat-with").innerText="DM: "+user

loadChat()
}

function closeChat(){
document.getElementById("inbox-screen").classList.remove("hidden")
document.getElementById("dm-screen").classList.add("hidden")
document.getElementById("dm-tools").style.display="none"
}

function searchUser(){

let q=document.getElementById("contactSearch").value

fetch("/search_user?q="+q)
.then(r=>r.json())
.then(data=>{

let list=document.getElementById("chat-list")
list.innerHTML=""

data.forEach(u=>{
let d=document.createElement("div")
d.className="chat-item"
d.innerText=">> "+u
d.onclick=()=>openChat(u)
list.appendChild(d)
})

})

}


function loadChat(){

fetch("/load_chat/"+currentChat)
.then(r=>r.json())
.then(data=>{

let container=document.getElementById("chat-history")
container.innerHTML=""
playlist=[]

data.forEach(msg=>{

let div=document.createElement("div")
div.className="msg-bubble"

if(msg.type=="text"){
div.innerText=msg.sender+": "+msg.content
}

if(msg.type=="image"){
div.innerHTML="<div class='msg-media'><img src='/uploads/"+msg.content+"'></div>"
}

if(msg.type=="video"){
div.innerHTML="<div class='msg-media'><video controls src='/uploads/"+msg.content+"'></video></div>"
}

if(msg.type=="audio"){
let index=playlist.length
playlist.push("/uploads/"+msg.content)

div.innerHTML="<div class='msg-media btn-black' onclick='playTrack("+index+")'>MP3_"+index+"</div>"
}

container.appendChild(div)

})

})

}


function sendMsg(){

let txt=document.getElementById("msg-input").value

fetch("/send_message",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"to="+currentChat+"&text="+txt
}).then(()=>{
document.getElementById("msg-input").value=""
loadChat()
})

}

document.getElementById("fileInput").addEventListener("change",uploadFile)
document.getElementById("audioInput").addEventListener("change",uploadFile)

function uploadFile(){

let file=this.files[0]

let fd=new FormData()
fd.append("file",file)
fd.append("to",currentChat)

fetch("/upload",{method:"POST",body:fd}).then(loadChat)

}

function sendLocation(){

navigator.geolocation.getCurrentPosition(p=>{

fetch("/send_location",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"to="+currentChat+"&lat="+p.coords.latitude+"&lon="+p.coords.longitude
}).then(loadChat)

})

}

function playTrack(i){

currentTrack=i
audio.src=playlist[i]
audio.play()

document.getElementById("top-mini-player").classList.add("active")
document.getElementById("master-play").innerText="PAUSE"

}

function prevTrack(){

currentTrack--
if(currentTrack<0)currentTrack=playlist.length-1

playTrack(currentTrack)

}

function nextTrack(){

currentTrack++
if(currentTrack>=playlist.length)currentTrack=0

playTrack(currentTrack)

}

function togglePlayback(){

if(audio.paused){
audio.play()
document.getElementById("master-play").innerText="PAUSE"
}
else{
audio.pause()
document.getElementById("master-play").innerText="PLAY"
}

}

function toggleFullPlayer(show){
document.getElementById("bottom-player").classList.toggle("open",show)
}

function cancelPlayer(){

let wasPaused=audio.paused

audio.pause()

toggleFullPlayer(false)

if(wasPaused){
document.getElementById("top-mini-player").classList.remove("active")
}

}

audio.ontimeupdate=()=>{

let cur=audio.currentTime
let dur=audio.duration||0

seeker.max=dur
seeker.value=cur

let fmt=s=>Math.floor(s/60).toString().padStart(2,"0")+":"+Math.floor(s%60).toString().padStart(2,"0")

document.getElementById("mini-time").innerText=fmt(cur)
document.getElementById("cur-time").innerText=fmt(cur)
document.getElementById("total-time").innerText=fmt(dur)

}

seeker.oninput=()=>audio.currentTime=seeker.value


function updateClock(){

let now=new Date()

document.getElementById("clock").innerText=
now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0")

}

setInterval(updateClock,1000)
updateClock()

setInterval(()=>{if(currentChat)loadChat()},3000)

</script>

</body>
</html>
