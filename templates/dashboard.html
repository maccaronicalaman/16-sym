<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NOKIA_OS_v1.0</title>
    <style>
        :root { --bg: #9cb18d; --dark: #1a1a1a; }
        
        body {
            background-color: var(--bg);
            color: var(--dark);
            font-family: 'Courier New', Courier, monospace;
            padding: 10px; margin: 0;
            text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center;
        }

        .phone-screen {
            width: 320px; height: 560px;
            border: 4px solid var(--dark);
            padding: 10px; background-color: var(--bg);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 10px 10px 0px #7a8a6e;
        }

        /* --- HEADER & TOP TRACKER --- */
        header { border-bottom: 2px solid var(--dark); flex-shrink: 0; padding-bottom: 5px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.7em; }
        
        #top-mini-player {
            height: 0; opacity: 0; overflow: hidden;
            background: rgba(0,0,0,0.1); text-align: center;
            transition: 0.3s; cursor: pointer; font-size: 0.65em;
            border-top: 1px dashed transparent; margin-top: 5px;
        }
        #top-mini-player.active { height: 25px; opacity: 1; border-top: 1px dashed var(--dark); padding-top: 5px; }

        /* --- BLACK BUTTONS --- */
        .btn-black {
            background: var(--dark); color: var(--bg); border: none;
            padding: 5px 8px; font-family: inherit; font-size: 0.7em;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .btn-black:active { opacity: 0.7; }

        /* --- VIEWS --- */
        #view-container { flex-grow: 1; overflow-y: auto; margin: 10px 0; position: relative; }

        /* Inbox */
        .search-box input {
            width: 92%; background: transparent; border: 2px solid var(--dark);
            padding: 5px; font-family: inherit; outline: none; margin-bottom: 10px;
        }
        .chat-item { padding: 10px; border-bottom: 1px dashed var(--dark); cursor: pointer; font-size: 0.8em; }

        /* DM Chat */
        .msg-bubble { border: 1px solid var(--dark); padding: 6px; margin-bottom: 8px; font-size: 0.75em; word-wrap: break-word; }
        .msg-meta { margin-top: 5px; display: flex; gap: 5px; }
        .mp3-msg { background: #8a9e7c; border: 1px solid var(--dark); padding: 5px; cursor: pointer; font-size: 0.7em; margin: 5px 0; }

        /* --- FULL PLAYER (BOTTOM SLIDE) --- */
        #bottom-player {
            position: absolute; bottom: -200px; left: 0; right: 0;
            height: 180px; background: var(--bg); border-top: 3px solid var(--dark);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px; z-index: 20; text-align: center;
        }
        #bottom-player.open { bottom: 0; }
        
        .scrubber { width: 100%; cursor: pointer; accent-color: var(--dark); height: 10px; }

        /* --- FOOTER (DM ONLY) --- */
        #dm-tools { border-top: 2px solid var(--dark); padding-top: 8px; display: none; }
        .input-row { display: flex; gap: 5px; margin-bottom: 5px; }
        #msg-input { flex-grow: 1; background: transparent; border: 1px solid var(--dark); font-family: inherit; padding: 4px; }
        .share-row { display: flex; justify-content: space-between; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="phone-screen">
    <header>
        <div class="status-bar">
            <span>📶 16-SYM</span> <span id="clock">00:00</span> <span>🔋</span>
        </div>
        <div id="top-mini-player" onclick="toggleFullPlayer(true)">
            [ <span id="mini-time">00:00</span> ] PLAYING_MP3...
        </div>
    </header>

    <div id="view-container">
        <div id="inbox-screen">
            <div class="search-box">
                <input type="text" id="contactSearch" placeholder="SEARCH..." onkeyup="filterContacts()">
            </div>
            <div id="chat-list">
                <div class="chat-item" onclick="openChat('ISKEN')">>> ISKEN</div>
                <div class="chat-item" onclick="openChat('MCB_SQUAD')">>> MCB_SQUAD</div>
                <div class="chat-item" onclick="openChat('AIDAN')">>> AIDAN</div>
            </div>
        </div>

        <div id="dm-screen" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <button class="btn-black" onclick="closeChat()">< BACK</button>
                <b id="chat-with" style="font-size: 0.7em;"></b>
            </div>
            <div id="chat-history">
                <div class="msg-bubble">WELCOME TO CLUB</div>
                <div class="mp3-msg" onclick="playAudio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">
                    📻 VOICE_REC_01.MP3
                </div>
            </div>
        </div>
    </div>

    <footer id="dm-tools">
        <div class="input-row">
            <input type="text" id="msg-input" maxlength="16" placeholder="MAX 16 SYM" onkeydown="if(event.key==='Enter') sendMsg()">
            <button class="btn-black" onclick="sendMsg()">SEND</button>
        </div>
        <div class="share-row">
            <button class="btn-black" onclick="shareLoc()">LOC</button>
            <button class="btn-black" onclick="alert('PHOTO_UPLOADER')">IMG</button>
            <button class="btn-black" onclick="alert('VIDEO_UPLOADER')">VID</button>
        </div>
    </footer>

    <div id="bottom-player">
        <div style="font-size: 0.7em; margin-bottom: 10px;">SYSTEM_AUDIO_PRO</div>
        <input type="range" id="main-seeker" class="scrubber" value="0" step="0.1">
        <div style="display: flex; justify-content: space-between; font-size: 0.6em; margin-top: 5px;">
            <span id="cur-time">00:00</span>
            <span id="total-time">00:00</span>
        </div>
        <div style="display:flex; justify-content: center; gap: 20px; margin-top: 15px;">
            <button class="btn-black" onclick="seekAudio(-5)">-5s</button>
            <button class="btn-black" id="master-play" onclick="togglePlayback()">PAUSE</button>
            <button class="btn-black" onclick="seekAudio(5)">+5s</button>
        </div>
        <button class="btn-black" style="width:100%; margin-top:20px;" onclick="toggleFullPlayer(false)">MINIMIZE</button>
    </div>
</div>

<script>
    let audio = new Audio();
    const seeker = document.getElementById('main-seeker');

    // --- VIEW SWITCHING ---
    function openChat(user) {
        document.getElementById('inbox-screen').classList.add('hidden');
        document.getElementById('dm-screen').classList.remove('hidden');
        document.getElementById('dm-tools').style.display = 'block';
        document.getElementById('chat-with').innerText = "DM: " + user;
    }

    function closeChat() {
        document.getElementById('inbox-screen').classList.remove('hidden');
        document.getElementById('dm-screen').classList.add('hidden');
        document.getElementById('dm-tools').style.display = 'none';
        audio.pause();
        document.getElementById('top-mini-player').classList.remove('active');
        toggleFullPlayer(false);
    }

    // --- SEARCH ---
    function filterContacts() {
        let val = document.getElementById('contactSearch').value.toUpperCase();
        let items = document.getElementsByClassName('chat-item');
        for (let item of items) {
            item.style.display = item.innerText.includes(val) ? "" : "none";
        }
    }

    // --- AUDIO SYSTEM (WITH SCRUBBING) ---
    function playAudio(url) {
        audio.src = url;
        audio.play();
        document.getElementById('top-mini-player').classList.add('active');
        document.getElementById('master-play').innerText = "PAUSE";
    }

    audio.ontimeupdate = () => {
        const cur = audio.currentTime;
        const dur = audio.duration || 0;
        seeker.max = dur;
        seeker.value = cur;
        
        let fmt = (s) => Math.floor(s/60).toString().padStart(2,'0') + ":" + Math.floor(s%60).toString().padStart(2,'0');
        document.getElementById('mini-time').innerText = fmt(cur);
        document.getElementById('cur-time').innerText = fmt(cur);
        document.getElementById('total-time').innerText = fmt(dur);
    };

    // Scrubbing logic: Move audio to where the slider is moved
    seeker.oninput = () => { audio.currentTime = seeker.value; };

    function togglePlayback() {
        if (audio.paused) { audio.play(); document.getElementById('master-play').innerText = "PAUSE"; }
        else { audio.pause(); document.getElementById('master-play').innerText = "PLAY"; }
    }

    function seekAudio(sec) { audio.currentTime += sec; }

    function toggleFullPlayer(show) {
        document.getElementById('bottom-player').classList.toggle('open', show);
    }

    // --- CHAT LOGIC ---
    function sendMsg() {
        const input = document.getElementById('msg-input');
        if (!input.value) return;
        
        const container = document.getElementById('chat-history');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-bubble';
        
        // Store just the text in a span so COPY is clean
        const txt = input.value;
        msgDiv.innerHTML = `<span>${txt}</span>
            <div class="msg-meta">
                <button class="btn-black" onclick="copyContent('${txt}')">COPY</button>
                <button class="btn-black" onclick="alert('SELECT_CONTACT_TO_FWD')">FWD</button>
            </div>`;
        
        container.appendChild(msgDiv);
        input.value = "";
        container.scrollTop = container.scrollHeight;
    }

    function copyContent(text) {
        navigator.clipboard.writeText(text);
        alert("TEXT COPIED");
    }

    function shareLoc() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('msg-input').value = `LOC:${p.coords.latitude.toFixed(2)},${p.coords.longitude.toFixed(2)}`;
            });
        }
    }

    // Real-time Clock
    function updateClock() {
        let now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
